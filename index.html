<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Ohio Valley Flood Risk Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="header">
    <div class="header-left">
      <h1>Ohio Valley Risk Explorer</h1>
      <p id="subtitle">Flood Risk · Poverty · Median Income</p>
    </div>


  </div>

  <div id="mapid"></div>

  <div id="controls">
    <select id="categorySelect" class="categorySelect"></select>
    
    <div class="control-divider"></div>
    
    <button id="cityToggle" class="city-toggle">🏙️ HIDE CITIES</button>
    
    <button id="resetViewBtn" class="city-toggle">RESET VIEW</button>
  </div>

  <script src="sketch.js"></script>
  <div id="cursor-tooltip"></div>
</body>
</html>
